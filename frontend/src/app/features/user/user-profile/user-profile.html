<div class="max-w-2xl mx-auto space-y-6 animate-fade-in">
  
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-4">
      <button (click)="goBack()" class="p-2.5 rounded-xl border border-gray-200 bg-white text-gray-500 hover:bg-gray-50 cursor-pointer dark:border-zinc-700/60 dark:bg-zinc-800 dark:text-zinc-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
      </button>
      <div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-zinc-50">User Profile</h1>
        <p class="text-sm text-gray-500 dark:text-zinc-400">
          {{ isOwnProfile ? 'Manage your personal account details.' : 'View team member information.' }}
        </p>
      </div>
    </div>

    <button 
      *ngIf="isOwnProfile"
      (click)="toggleEditMode()"
      [ngClass]="isEditMode ? 'bg-gray-100 text-gray-700 dark:bg-zinc-700 dark:text-zinc-200' : 'bg-indigo-50 text-indigo-600 dark:bg-indigo-500/10 dark:text-indigo-400'"
      class="px-4 py-2 rounded-xl text-xs font-bold cursor-pointer transition-all active:scale-95"
    >
      {{ isEditMode ? 'Cancel' : '✍️ Edit Profile' }}
    </button>
  </div>

  <div class="bg-white dark:bg-zinc-800 rounded-2xl border border-gray-100 dark:border-zinc-700/50 shadow-sm overflow-hidden">
    
    <div class="h-28 bg-gradient-to-r from-indigo-500 to-purple-600 flex items-end px-6 relative">
      <div class="absolute -bottom-10 left-6 h-20 w-20 rounded-2xl bg-white dark:bg-zinc-900 shadow-md border-4 border-white dark:border-zinc-800 flex items-center justify-center font-black text-2xl text-indigo-600 dark:text-indigo-400 select-none">
        {{ user.name.charAt(0).toUpperCase() }}
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" class="p-6 pt-14 space-y-5">
      
      <div>
        <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">Display Name</label>
        <input 
          type="text" name="name" [(ngModel)]="user.name" 
          [disabled]="!isEditMode"
          required
          class="w-full px-4 py-2.5 rounded-xl border focus:outline-none focus:ring-2 bg-white text-gray-950 border-gray-200 focus:ring-indigo-500 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700 disabled:opacity-80 disabled:bg-gray-50 dark:disabled:bg-zinc-900/40" 
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">Email Address</label>
        <input 
          type="email" name="email" [ngModel]="user.email" 
          disabled
          class="w-full px-4 py-2.5 rounded-xl border bg-gray-50 text-gray-400 border-gray-200 dark:bg-zinc-900/40 dark:text-zinc-500 dark:border-zinc-700 cursor-not-allowed" 
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">Bio</label>
        <textarea 
          name="bio" [(ngModel)]="user.bio" rows="3"
          [disabled]="!isEditMode"
          class="w-full px-4 py-2.5 rounded-xl border focus:outline-none focus:ring-2 bg-white text-gray-950 border-gray-200 focus:ring-indigo-500 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700 resize-none disabled:opacity-80 disabled:bg-gray-50 dark:disabled:bg-zinc-900/40"
          placeholder="Tell something about yourself..."
        ></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4 text-xs pt-4 border-t border-gray-50 dark:border-zinc-700/50">
        <div>
          <span class="block text-gray-400 mb-0.5 uppercase tracking-wider font-medium">System Role</span>
          <span class="font-bold text-gray-700 dark:text-zinc-300">{{ user.role }}</span>
        </div>
        <div>
          <span class="block text-gray-400 mb-0.5 uppercase tracking-wider font-medium">Member Since</span>
          <span class="font-mono text-gray-600 dark:text-zinc-400">{{ user.joinedAt | date:'longDate' }}</span>
        </div>
      </div>

      <div class="flex items-center justify-between pt-4 border-t border-gray-50 dark:border-zinc-700/50">
        
        <button 
          *ngIf="isOwnProfile"
          type="button" (click)="onLogout()" 
          class="px-4 py-2.5 rounded-xl font-bold text-red-600 hover:bg-red-50 dark:hover:bg-red-500/10 transition-colors text-sm cursor-pointer"
        >
          🚪 Log Out
        </button>
        <span *ngIf="!isOwnProfile"></span> <div class="flex gap-2" *ngIf="isEditMode">
          <button type="submit" [disabled]="!user.name.trim()" class="px-6 py-2.5 rounded-xl font-semibold text-white bg-indigo-600 hover:bg-indigo-700 dark:bg-indigo-500 shadow-md transition-all active:scale-98 text-sm cursor-pointer">
            Save Profile
          </button>
        </div>
      </div>

    </form>
  </div>
</div>
