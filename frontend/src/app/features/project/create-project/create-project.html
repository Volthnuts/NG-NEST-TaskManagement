<div class="min-h-screen rounded-2xl shadow-xl bg-gray-50 dark:bg-zinc-900 flex items-center justify-center p-6 transition-colors duration-300">
  <div class="w-full max-w-xl bg-white dark:bg-zinc-800 p-8 rounded-2xl shadow-md border border-gray-100 dark:border-zinc-700/60">
    
    <div class="mb-8">
      <h2 class="text-2xl font-extrabold text-gray-900 dark:text-zinc-50 mb-2">
        Create a new project space
      </h2>
      <p class="text-sm text-gray-500 dark:text-zinc-400">
        Workspaces are where your team can collaborate on tasks, manage pipelines, and keep track of deadlines.
      </p>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">
          Project Name <span class="text-red-500">*</span>
        </label>
        <input 
          type="text" 
          name="projectName"
          [(ngModel)]="projectName"
          required
          class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 transition-all bg-white text-gray-950 border-gray-300 focus:ring-indigo-500 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700 dark:focus:ring-indigo-500" 
          placeholder="e.g., Mobile App Development, Marketing Q3" 
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">
          Description
        </label>
        <textarea 
          name="projectDescription"
          [(ngModel)]="projectDescription"
          rows="4"
          class="w-full px-4 py-3 rounded-lg border focus:outline-none focus:ring-2 transition-all bg-white text-gray-950 border-gray-300 focus:ring-indigo-500 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700 dark:focus:ring-indigo-500 resize-none" 
          placeholder="What is this workspace about? (Optional)"
        ></textarea>
      </div>

      <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100 dark:border-zinc-700/50">
        <button 
          type="button"
          (click)="onCancel()"
          class="px-5 py-2.5 rounded-lg font-medium text-gray-600 dark:text-zinc-300 hover:bg-gray-100 dark:hover:bg-zinc-700/50 cursor-pointer transition-all text-sm"
        >
          Cancel
        </button>
        <button 
          type="submit"
          [disabled]="!projectName.trim()"
          class="px-5 py-2.5 rounded-lg font-semibold text-white bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer transition-all shadow-md text-sm dark:bg-indigo-500 dark:hover:bg-indigo-600 active:scale-98"
        >
          Create Workspace
        </button>
      </div>
    </form>

  </div>
</div>
