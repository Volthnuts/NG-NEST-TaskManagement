<div class="max-w-3xl mx-auto space-y-8 animate-fade-in">
  
  <div class="flex items-center gap-4">
    <button 
      (click)="onCancel()"
      class="p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-zinc-800 text-gray-500 dark:text-zinc-400 transition-colors cursor-pointer"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
    </button>
    <div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-zinc-50">Project Settings</h1>
      <p class="text-sm text-gray-500 dark:text-zinc-400">Manage your workspace details and configuration.</p>
    </div>
  </div>

  <div class="bg-white dark:bg-zinc-800 rounded-2xl border border-gray-100 dark:border-zinc-700/50 shadow-sm overflow-hidden">
    <div class="p-6 border-b border-gray-50 dark:border-zinc-700/50">
      <h2 class="text-lg font-semibold text-gray-900 dark:text-zinc-100">General Information</h2>
    </div>
    
    <form (ngSubmit)="onSave()" class="p-6 space-y-6">
      <div>
        <label class="block text-sm font-medium mb-2 text-gray-600 dark:text-zinc-400">
          Project Name <span class="text-red-500">*</span>
        </label>
        <input 
          type="text" 
          name="projectName"
          [(ngModel)]="projectName"
          required
          class="w-full px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 transition-all bg-white text-gray-950 border-gray-200 focus:ring-indigo-500 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700 dark:focus:ring-indigo-500/50" 
          placeholder="e.g. Marketing Team" 
        />
      </div>

      <div>
        <label class="block text-sm font-medium mb-2 text-gray-600 dark:text-zinc-400">
          Description
        </label>
        <textarea 
          name="projectDescription"
          [(ngModel)]="projectDescription"
          rows="4"
          class="w-full px-4 py-3 rounded-xl border focus:outline-none focus:ring-2 transition-all bg-white text-gray-950 border-gray-200 focus:ring-indigo-500 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700 dark:focus:ring-indigo-500/50 resize-none" 
          placeholder="Describe your workspace..."
        ></textarea>
      </div>

      <div class="flex items-center justify-end gap-3 pt-4">
        <button 
          type="button"
          (click)="onCancel()"
          class="px-5 py-2.5 rounded-xl font-medium text-gray-600 dark:text-zinc-300 hover:bg-gray-100 dark:hover:bg-zinc-700 cursor-pointer transition-all"
        >
          Cancel
        </button>
        <button 
          type="submit"
          [disabled]="!projectName.trim()"
          class="px-6 py-2.5 rounded-xl font-semibold text-white bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer transition-all shadow-md dark:bg-indigo-500 dark:hover:bg-indigo-600 active:scale-98"
        >
          Save Changes
        </button>
      </div>
    </form>
  </div>

  <div class="bg-white dark:bg-zinc-800 rounded-2xl border border-red-100 dark:border-red-900/30 shadow-sm overflow-hidden">
    <div class="p-6 border-b border-red-50 dark:border-red-900/20 bg-red-50/30 dark:bg-red-500/5">
      <h2 class="text-lg font-semibold text-red-600 dark:text-red-400">Danger Zone</h2>
    </div>
    
    <div class="p-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div>
        <h3 class="text-base font-bold text-gray-900 dark:text-zinc-100">Delete this project</h3>
        <p class="text-sm text-gray-500 dark:text-zinc-400">
          Once you delete a project, there is no going back. Please be certain.
        </p>
      </div>
      
      <button 
        (click)="onDeleteProject()"
        class="px-6 py-2.5 rounded-xl font-bold text-red-600 border border-red-200 hover:bg-red-600 hover:text-white transition-all cursor-pointer dark:border-red-900/50 dark:hover:bg-red-600"
      >
        Delete Project
      </button>
    </div>
  </div>

</div>
