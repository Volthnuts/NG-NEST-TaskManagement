<div *ngIf="currentView === 'LIST'" class="min-h-screen rounded-2xl shadow-xl bg-gray-50 dark:bg-zinc-900 flex items-center justify-center p-6 transition-colors duration-300">
  <div class="w-full max-w-4xl">
    
    <div class="text-center mb-10">
      <h2 class="text-3xl font-extrabold text-gray-900 dark:text-zinc-50 mb-3">Choose your project space</h2>
      <p class="text-gray-500 dark:text-zinc-400 max-w-md mx-auto">Select an existing workspace to continue your progress, or start fresh by building a new one.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div *ngFor="let space of projectSpaces" (click)="selectSpace(space.id)" class="group relative bg-white dark:bg-zinc-800 p-6 rounded-2xl border border-gray-200 dark:border-zinc-700/60 shadow-sm hover:shadow-xl hover:border-indigo-500 dark:hover:border-indigo-500 cursor-pointer transition-all duration-200 flex flex-col justify-between">
        <div>
          <div class="flex items-center justify-between mb-4">
            <div class="h-10 w-10 rounded-xl bg-indigo-50 dark:bg-indigo-500/10 flex items-center justify-center text-indigo-600 dark:text-indigo-400 font-bold text-lg group-hover:scale-105 transition-transform">{{ space.name.charAt(0) }}</div>
            <span [ngClass]="{'bg-emerald-50 text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-400': space.role === 'OWNER','bg-gray-100 text-gray-700 dark:bg-zinc-700 dark:text-zinc-300': space.role === 'MEMBER'}" class="text-xs font-medium px-2.5 py-1 rounded-full">{{ space.role }}</span>
          </div>
          <h3 class="text-lg font-bold text-gray-900 dark:text-zinc-50 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors mb-2">{{ space.name }}</h3>
          <p class="text-sm text-gray-500 dark:text-zinc-400 line-clamp-2 mb-6">{{ space.description }}</p>
        </div>
        <div class="flex items-center justify-between pt-4 border-t border-gray-100 dark:border-zinc-700/50 text-xs text-gray-400 dark:text-zinc-500">
          <div class="flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <span>{{ space.memberCount }} members</span>
          </div>
          <span class="transform translate-x-0 group-hover:translate-x-1 transition-transform text-indigo-600 dark:text-indigo-400 font-semibold flex items-center gap-1">Enter <span class="text-sm">&rarr;</span></span>
        </div>
      </div>

      <button (click)="openCreateForm()" class="group bg-dashed border-2 border-dashed border-gray-300 dark:border-zinc-700 hover:border-indigo-500 dark:hover:border-indigo-500 bg-transparent hover:bg-white dark:hover:bg-zinc-800/50 p-6 rounded-2xl flex flex-col items-center justify-center text-center cursor-pointer min-h-50 transition-all duration-200">
        <div class="h-12 w-12 rounded-full border border-gray-300 dark:border-zinc-700 group-hover:border-indigo-500 dark:group-hover:border-indigo-500 flex items-center justify-center text-gray-400 group-hover:text-indigo-500 dark:group-hover:text-indigo-400 group-hover:scale-110 transition-all mb-4">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </div>
        <span class="block text-base font-semibold text-gray-700 dark:text-zinc-300 group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors">Create a new space</span>
        <span class="block text-xs text-gray-400 dark:text-zinc-500 mt-1 max-w-50">Set up a brand new workspace for your teammates.</span>
      </button>
    </div>

    <div class="text-center mt-10">
      <a routerLink="/login" class="text-sm text-gray-400 dark:text-zinc-500 hover:text-indigo-500 dark:hover:text-indigo-400 transition-colors">&larr; Back to Log In</a>
    </div>
  </div>
</div>

<app-create-project 
  *ngIf="currentView === 'CREATE'"
  (cancel)="backToList()"
  (projectCreated)="handleProjectCreation($event)" 
></app-create-project>
