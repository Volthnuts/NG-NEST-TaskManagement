<div class="max-w-3xl mx-auto space-y-6 animate-fade-in">
  <div class="flex items-center gap-4">
    <button (click)="goBack()" class="p-2.5 rounded-xl border border-gray-200 bg-white text-gray-500 hover:bg-gray-50 cursor-pointer dark:border-zinc-700/60 dark:bg-zinc-800 dark:text-zinc-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
    </button>
    <div>
      <h1 class="text-2xl font-bold text-gray-900 dark:text-zinc-50">Create New Task</h1>
      <p class="text-sm text-gray-500 dark:text-zinc-400">Add a new item to your project workspace backlog.</p>
    </div>
  </div>

  <div class="bg-white dark:bg-zinc-800 rounded-2xl border border-gray-100 dark:border-zinc-700/50 shadow-sm p-6">
    <form (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">Task Title <span class="text-red-500">*</span></label>
        <input type="text" name="title" [(ngModel)]="title" required class="w-full px-4 py-2.5 rounded-xl border bg-white text-gray-950 border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700" placeholder="e.g., Integrate Payment Gateway" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">Description</label>
        <textarea name="description" [(ngModel)]="description" rows="4" class="w-full px-4 py-2.5 rounded-xl border bg-white text-gray-950 border-gray-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700 resize-none" placeholder="Provide details about this task..."></textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">Priority Level</label>
          <select name="priority" [(ngModel)]="priority" class="w-full px-4 py-2.5 rounded-xl border bg-white text-gray-950 border-gray-200 focus:outline-none focus:ring-2 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700 cursor-pointer">
            <option value="LOW">Low</option>
            <option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option>
            <option value="URGENT">Urgent 🚨</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">Due Date</label>
          <input type="date" name="dueDate" [(ngModel)]="dueDate" class="w-full px-4 py-2.5 rounded-xl border bg-white text-gray-950 border-gray-200 focus:outline-none focus:ring-2 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700" />
        </div>
      </div>

      <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-50 dark:border-zinc-700/50">
        <button type="button" (click)="goBack()" class="px-5 py-2.5 rounded-xl font-medium text-gray-600 dark:text-zinc-300 hover:bg-gray-100 dark:hover:bg-zinc-700 cursor-pointer transition-all">Cancel</button>
        <button type="submit" [disabled]="!title.trim()" class="px-6 py-2.5 rounded-xl font-semibold text-white bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 cursor-pointer dark:bg-indigo-500 dark:hover:bg-indigo-600 shadow-md">Create Task</button>
      </div>
    </form>
  </div>
</div>
