<div class="min-h-screen bg-gray-50 dark:bg-zinc-950 flex flex-col items-center justify-center p-4">
  <div class="max-w-md w-full bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800/80 p-8 shadow-xl space-y-6">
    
    <div class="text-center">
      <h2 class="text-2xl font-bold text-gray-900 dark:text-zinc-50">ตั้งรหัสผ่านใหม่</h2>
      <p class="text-sm text-gray-500 dark:text-zinc-400 mt-1">กรุณากรอกรหัสผ่านใหม่ที่คุณต้องการใช้งาน</p>
    </div>

    <div *ngIf="!token && errorMessage" class="bg-rose-50 dark:bg-rose-500/5 p-4 rounded-xl text-center text-sm text-rose-600 dark:text-rose-400 font-medium">
      {{ errorMessage }}
    </div>

    <form *ngIf="token && !isSuccess" (ngSubmit)="onSubmit()" class="space-y-4">
      
      <div *ngIf="errorMessage" class="p-3 bg-rose-50 dark:bg-rose-500/5 text-xs text-rose-600 dark:text-rose-400 rounded-xl font-medium">
        ⚠️ {{ errorMessage }}
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">รหัสผ่านใหม่</label>
        <input type="password" name="newPassword" [(ngModel)]="newPassword" required placeholder="••••••••"
          class="w-full px-4 py-2.5 rounded-xl border focus:outline-none focus:ring-2 bg-white text-gray-950 border-gray-200 focus:ring-indigo-500 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">ยืนยันรหัสผ่านใหม่</label>
        <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" required placeholder="••••••••"
          class="w-full px-4 py-2.5 rounded-xl border focus:outline-none focus:ring-2 bg-white text-gray-950 border-gray-200 focus:ring-indigo-500 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700" />
      </div>

      <button type="submit" [disabled]="isLoading || !newPassword || !confirmPassword"
        class="w-full py-3 rounded-xl font-semibold text-white bg-rose-600 hover:bg-rose-700 transition-all shadow-md flex items-center justify-center gap-2 cursor-pointer disabled:opacity-50">
        <span *ngIf="isLoading" class="h-4 w-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
        {{ isLoading ? 'กำลังบันทึก...' : 'เปลี่ยนรหัสผ่านสำเร็จ' }}
      </button>
    </form>

    <div *ngIf="isSuccess" class="bg-emerald-50 dark:bg-emerald-500/10 p-5 rounded-xl border border-emerald-100 dark:border-emerald-500/20 text-center space-y-2">
      <div class="text-3xl">🎉</div>
      <p class="text-md text-emerald-800 dark:text-emerald-400 font-bold">เปลี่ยนรหัสผ่านสำเร็จแล้ว!</p>
      <p class="text-xs text-gray-400 dark:text-zinc-500">ระบบกำลังนำคุณไปยังหน้าเข้าสู่ระบบใน 3 วินาที...</p>
    </div>

  </div>
</div>
