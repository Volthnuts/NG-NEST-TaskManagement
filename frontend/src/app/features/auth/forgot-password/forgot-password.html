<div class="min-h-screen bg-gray-50 dark:bg-zinc-950 flex flex-col items-center justify-center p-4">
  <div class="max-w-md w-full bg-white dark:bg-zinc-900 rounded-2xl border border-gray-100 dark:border-zinc-800/80 p-8 shadow-xl space-y-6">
    
    <div class="text-center">
      <h2 class="text-2xl font-bold text-gray-900 dark:text-zinc-50">ลืมรหัสผ่านใช่ไหม?</h2>
      <p class="text-sm text-gray-500 dark:text-zinc-400 mt-1">กรอกอีเมลของคุณเพื่อรับลิงก์สำหรับตั้งรหัสผ่านใหม่</p>
    </div>

    <form *ngIf="!isSentSuccess" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1.5 text-gray-600 dark:text-zinc-400">อีเมลบัญชีผู้ใช้</label>
        <input type="email" name="email" [(ngModel)]="email" required placeholder="name@company.com"
          class="w-full px-4 py-2.5 rounded-xl border focus:outline-none focus:ring-2 bg-white text-gray-950 border-gray-200 focus:ring-indigo-500 dark:bg-zinc-900 dark:text-zinc-100 dark:border-zinc-700" />
      </div>

      <button type="submit" [disabled]="isLoading || !email"
        class="w-full py-3 rounded-xl font-semibold text-white bg-indigo-600 hover:bg-indigo-700 transition-all shadow-md flex items-center justify-center gap-2 cursor-pointer disabled:opacity-50">
        <span *ngIf="isLoading" class="h-4 w-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
        {{ isLoading ? 'กำลังส่งคำขอ...' : 'ส่งลิงก์กู้คืนรหัสผ่าน' }}
      </button>
    </form>

    <div *ngIf="isSentSuccess" class="bg-emerald-50 dark:bg-emerald-500/10 p-4 rounded-xl border border-emerald-100 dark:border-emerald-500/20 text-center space-y-3">
      <div class="text-2xl">✉️</div>
      <p class="text-sm text-emerald-800 dark:text-emerald-400 font-medium">{{ message }}</p>
      <p class="text-xs text-gray-400 dark:text-zinc-500">กรุณาตรวจสอบกล่องจดหมายของคุณภายใน 15 นาที</p>
    </div>

    <div class="text-center pt-2">
      <a routerLink="/login" class="text-sm font-semibold text-indigo-600 hover:text-indigo-500 dark:text-indigo-400">
        ← กลับไปหน้าเข้าสู่ระบบ
      </a>
    </div>

  </div>
</div>
